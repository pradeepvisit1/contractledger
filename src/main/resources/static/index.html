<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ContractLedger · Sign In</title>
<link rel="stylesheet" href="style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
.login-wrap { width:100%; max-width:400px; padding:24px 16px; }
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo-icon { width:64px; height:64px; background:var(--accent); border-radius:18px; display:inline-flex; align-items:center; justify-content:center; font-size:32px; margin-bottom:14px; box-shadow:0 8px 24px rgba(37,99,235,.25); }
.login-logo h1 { font-size:26px; font-weight:800; color:var(--text); letter-spacing:-0.5px; }
.login-logo p { font-size:13px; color:var(--text3); margin-top:4px; }
.login-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px; box-shadow:var(--shadow-lg); }
.login-card h2 { font-size:18px; font-weight:800; margin-bottom:20px; color:var(--text); }
.err-box { background:var(--danger-lt); border:1px solid #fecaca; border-radius:8px; padding:10px 14px; font-size:13px; color:var(--danger); margin-bottom:14px; display:none; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-icon">🏗️</div>
    <h1>ContractLedger</h1>
    <p>Construction Finance Management</p>
  </div>
  <div class="login-card">
    <h2>Sign In</h2>
    <div class="err-box" id="err"></div>
    <div class="form-group">
      <label>Username</label>
      <input class="fi" id="lu" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="fi" id="lp" type="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" id="lbtn" onclick="doLogin()" style="margin-top:4px;padding:11px">
      Sign In →
    </button>
    <div style="margin-top:16px;font-size:11px;color:var(--text3);text-align:center">
      Shared MySQL database · Real-time multi-user
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
<script>
// If already logged in, redirect to dashboard
if (TK && CU) window.location.href = 'dashboard.html';

async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  const err = document.getElementById('err');
  err.style.display = 'none';
  if (!u || !p) { err.textContent = 'Enter username and password'; err.style.display = 'block'; return; }
  const btn = document.getElementById('lbtn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  const res = await api('POST', '/auth/login', { username: u, password: p });
  btn.textContent = 'Sign In →'; btn.disabled = false;
  if (!res) { err.textContent = 'Invalid username or password'; err.style.display = 'block'; return; }
  TK = res.token;
  CU = { username: res.username, fullName: res.fullName, role: res.role };
  localStorage.setItem('cl_tk', TK);
  localStorage.setItem('cl_cu', JSON.stringify(CU));
  window.location.href = 'dashboard.html';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
